apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-web-app
  namespace: default
  labels:
    app: pipeline-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pipeline-app
  template:
    metadata:
      labels:
        app: pipeline-app
    spec:
      containers:
      - name: web-container
        image: DOCKERHUB_USERNAME/pipeline-app:IMAGE_TAG
        ports:
        - containerPort: 80
          name: http-port
        resources:
          requests:
            memory: "32Mi"
            cpu: "20m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        readinessProbe:
          httpGet:
            path: /
            port: http-port
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: http-port
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pipeline-app-service
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: http-port
    nodePort: 30090
  selector:
    app: pipeline-app
